name: Research Validation Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, codex/**]
  workflow_dispatch:

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest numpy scikit-learn
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Run targeted validation tests
        env:
          PYTHONPATH: src
        run: |
          pytest -q \
            tests/test_reviewer_quality_audit.py \
            tests/test_reviewer_quality_audit_cli.py \
            tests/test_reviewer_quality_audit_data_algorithm_addendum.py \
            tests/test_data_algorithm_quality_review.py \
            tests/test_data_algorithm_quality_review_dq3_closure.py \
            tests/test_data_algorithm_quality_review_dq5_closure.py \
            tests/test_manuscript_freeze_packet.py \
            tests/test_out_of_time_threshold_policy_compare.py \
            tests/test_transfer_calibration_probe.py \
            tests/test_multisource_transfer_governance_bridge.py \
            tests/test_multisource_transfer_model_scan_summary.py \
            tests/test_external_validity_manuscript_assets.py \
            tests/test_transfer_override_seed_stress_test.py \
            tests/test_transfer_policy_governance_lock.py \
            tests/test_manuscript_enhancement_pack.py \
            tests/test_submission_bundle_verify_script.py \
            tests/test_submission_preflight_report_script.py

      - name: Build and verify manuscript submission bundle
        id: submission_bundle
        run: |
          ./examples/run_manuscript_submission_bundle_2026-04-09.sh | tee submission_bundle_build.log
          ./examples/run_manuscript_submission_verify_2026-04-09.sh | tee submission_bundle_verify.log
          BUNDLE_SHA="$(grep '^verified_bundle_zip_sha256=' submission_bundle_verify.log | tail -n1 | cut -d'=' -f2-)"
          if [[ -z "$BUNDLE_SHA" ]]; then
            echo "Failed to parse bundle SHA from verification output."
            exit 1
          fi
          echo "bundle_sha256=$BUNDLE_SHA" >> "$GITHUB_OUTPUT"

      - name: Upload manuscript submission bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-submission-bundle-v0.2-2026-04-09
          path: |
            docs/manuscript/v0.2_2026-04-09/submission_bundle_v0.2_2026-04-09.zip
            docs/manuscript/v0.2_2026-04-09/submission_bundle_manifest_v0.2_2026-04-09.txt
            docs/manuscript/v0.2_2026-04-09/manuscript_consistency_report_v0.2_2026-04-09.md
            docs/manuscript/v0.2_2026-04-09/manuscript_submission_preflight_report_v0.2_2026-04-09.md
          if-no-files-found: error

      - name: Append submission summary
        run: |
          {
            echo "### Manuscript Submission Bundle"
            echo "- Bundle SHA-256: \`${{ steps.submission_bundle.outputs.bundle_sha256 }}\`"
            echo "- Artifact: \`manuscript-submission-bundle-v0.2-2026-04-09\`"
          } >> "$GITHUB_STEP_SUMMARY"
