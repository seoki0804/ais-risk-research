name: Research Validation Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, codex/**]
  workflow_dispatch:

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest numpy scikit-learn

      - name: Run targeted validation tests
        env:
          PYTHONPATH: src
        run: |
          pytest -q \
            tests/test_reviewer_quality_audit.py \
            tests/test_reviewer_quality_audit_cli.py \
            tests/test_reviewer_quality_audit_data_algorithm_addendum.py \
            tests/test_data_algorithm_quality_review.py \
            tests/test_data_algorithm_quality_review_dq3_closure.py \
            tests/test_data_algorithm_quality_review_dq5_closure.py \
            tests/test_manuscript_freeze_packet.py \
            tests/test_out_of_time_threshold_policy_compare.py \
            tests/test_transfer_calibration_probe.py \
            tests/test_multisource_transfer_governance_bridge.py \
            tests/test_multisource_transfer_model_scan_summary.py \
            tests/test_external_validity_manuscript_assets.py \
            tests/test_transfer_override_seed_stress_test.py \
            tests/test_transfer_policy_governance_lock.py
